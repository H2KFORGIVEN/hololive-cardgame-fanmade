name: Scrape & Deploy

on:
  push:
    branches: [master]
  schedule:
    # Daily at 06:00 UTC (= 14:00 Asia/Taipei). Previously weekly on Monday.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so `git commit` doesn't produce truncated
          # merge commits on the shallow clone that checkout@v4 defaults to.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run scraper
        id: scrape
        continue-on-error: true
        run: uv run python -m scraper.run

      - name: Check scraper output
        id: check
        run: |
          if [ -f "web/data/cards.json" ] && [ -s "web/data/cards.json" ]; then
            echo "fresh=true" >> "$GITHUB_OUTPUT"
            echo "Scraper produced fresh data"
          else
            echo "fresh=false" >> "$GITHUB_OUTPUT"
            echo "Scraper failed or empty, will use committed fallback data"
          fi

      - name: Commit updated data & cache
        if: steps.check.outputs.fresh == 'true'
        run: |
          set -e
          git config user.name "H2KFORGIVEN"
          git config user.email "22971845+H2KFORGIVEN@users.noreply.github.com"
          git add web/data/ translation_cache.json
          if git diff --cached --quiet; then
            echo "No data changes; skipping commit."
            exit 0
          fi
          git commit -m "chore: update scraped data & translation cache [skip ci]"
          # Retry push up to 3× to tolerate races with concurrent human pushes
          # (previously `git push || true` hid real failures; now we surface them)
          for i in 1 2 3; do
            if git pull --rebase origin master && git push origin master; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed; retrying in 15s..."
            sleep 15
          done
          echo "Push failed after 3 attempts"
          exit 1

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
