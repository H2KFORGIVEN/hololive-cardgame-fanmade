            "@type": "Answer",

          }

      "name": "hOCG Meta Deck Tier List",

  <script>
    // Intro splash
    (function() {
      var intro = document.getElementById('introSplash');
      if (!intro) return;
      setTimeout(function() {
        intro.classList.add('intro-hide');
        setTimeout(function() { intro.remove(); }, 600);
      }, 3200);
      intro.addEventListener('click', function() {
        intro.classList.add('intro-hide');
        setTimeout(function() { intro.remove(); }, 600);
      });
    })();

    // Load homepage data from JSON and render
    (function() {
      fetch('data/homepage.json').then(function(r){return r.json()}).then(function(data) {
        // Render banners
        var carouselTrack = document.getElementById('carouselTrack');
        if (carouselTrack && data.banners) {
          carouselTrack.innerHTML = data.banners.map(function(b) {
            return '<a class="carousel-slide" href="' + (b.url||'#') + '" target="_blank" rel="noopener">' +
              '<img src="' + (b.localImage||b.image||'') + '" alt="' + (b.alt||'') + '" loading="lazy">' +
            '</a>';
          }).join('');
        }
        // Render products
        var productsTrack = document.getElementById('productsTrack');
        if (productsTrack && data.products) {
          productsTrack.innerHTML = data.products.map(function(p) {
            return '<a class="product-card" href="' + (p.url||'#') + '" target="_blank" rel="noopener">' +
              '<img src="' + (p.localImage||p.image||'') + '" alt="" loading="lazy">' +
              '<span>' + (p.name||'') + '</span>' +
            '</a>';
          }).join('');
        }
        // Render news
        var newsGrid = document.getElementById('newsGrid');
        if (newsGrid && data.news) {
          newsGrid.innerHTML = data.news.map(function(n) {
            var tagClass = '';
            if (n.tag === 'Products') tagClass = ' tag-products';
            else if (n.tag === 'Campaign') tagClass = ' tag-campaign';
            return '<a class="news-card" href="' + (n.url||'#') + '" target="_blank" rel="noopener">' +
              '<div class="news-card-img">' + (n.isNew ? '<span class="news-new-badge">NEW</span>' : '') +
                '<img src="' + (n.localImage||n.image||'') + '" alt="" loading="lazy"></div>' +
              '<div class="news-card-body">' +
                '<div class="news-card-info"><span class="news-date">' + (n.date||'') + '</span>' +
                  (n.tag ? '<span class="news-tag' + tagClass + '">' + n.tag + '</span>' : '') + '</div>' +
                '<p class="news-card-title">' + (n.title||'') + '</p>' +
              '</div>' +
            '</a>';
          }).join('');
        }
        // Init carousel after content loaded
        initCarousel();
        initProductsSlider();
      }).catch(function(e) { console.warn('Failed to load homepage data:', e); initCarousel(); initProductsSlider(); });
    })();

    // Carousel
    function initCarousel() {
      var track = document.getElementById('carouselTrack');
      var slides = track.querySelectorAll('.carousel-slide');
      var dotsWrap = document.getElementById('carouselDots');
      var current = 0;
      var total = slides.length;
      if (total === 0) return;
      var autoTimer;

      dotsWrap.innerHTML = '';
      for (var i = 0; i < total; i++) {
        var dot = document.createElement('button');
        dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        dot.dataset.index = i;
        dotsWrap.appendChild(dot);
      }

      // Set first slide active
      if (slides.length > 0) slides[0].classList.add('active');

      function goTo(idx) {
        current = ((idx % total) + total) % total;
        slides.forEach(function(s, j) { s.classList.toggle('active', j === current); });
        dotsWrap.querySelectorAll('.carousel-dot').forEach(function(d, j) {
          d.classList.toggle('active', j === current);
        });
      }

      dotsWrap.addEventListener('click', function(e) {
        if (e.target.dataset.index !== undefined) {
          goTo(parseInt(e.target.dataset.index)); resetAuto();
        }
      });

      function resetAuto() {
        clearInterval(autoTimer);
        autoTimer = setInterval(function() { goTo(current + 1); }, 5000);
      }
      resetAuto();
    }

    // Products slider
    function initProductsSlider() {
      var track = document.getElementById('productsTrack');
      if (!track) return;
      var scrollAmount = 300;
      document.getElementById('productsPrev')?.addEventListener('click', function() {
        track.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
      });
      document.getElementById('productsNext')?.addEventListener('click', function() {
        track.scrollBy({ left: scrollAmount, behavior: 'smooth' });
      });
    }

    // Language dropdown
    (function() {
      var btn = document.getElementById('langDropdownBtn');
      var menu = document.getElementById('langDropdownMenu');
      if (!btn || !menu) return;
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        menu.hidden = !menu.hidden;
      });
      document.addEventListener('click', function() {
        menu.hidden = true;
      });
    })();
  </script>
